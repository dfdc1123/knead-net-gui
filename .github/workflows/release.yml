name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libssl-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and version metadata
        run: node scripts/check-version.mjs --tag "${GITHUB_REF_NAME}"

      - name: Check Svelte and TypeScript
        run: pnpm check

      - name: Run frontend tests
        run: pnpm test:ui

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  package:
    name: Package ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows x64
            platform_id: windows
            os: windows-2022
            build_command: pnpm tauri build --ci --no-sign --bundles nsis,msi
            bundle_dir: target/release/bundle
            artifact_name: kneadnet-windows-x64
          - platform: Linux x64
            platform_id: linux
            os: ubuntu-22.04
            build_command: pnpm tauri build --ci --no-sign --bundles appimage,deb,rpm
            bundle_dir: target/release/bundle
            artifact_name: kneadnet-linux-x64
          - platform: macOS universal
            platform_id: macos
            os: macos-14
            build_command: pnpm tauri build --ci --no-sign --target universal-apple-darwin --bundles dmg
            bundle_dir: target/universal-apple-darwin/release/bundle
            artifact_name: kneadnet-macos-universal

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Add macOS universal targets
        if: matrix.platform_id == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux packaging dependencies
        if: matrix.platform_id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libssl-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build platform bundles
        run: ${{ matrix.build_command }}

      - name: Collect stable release assets
        run: node scripts/collect-release-assets.mjs --platform ${{ matrix.platform_id }} --bundle-dir ${{ matrix.bundle_dir }} --out release-assets

      - name: Upload packaged assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Create draft release
    needs: package
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Download platform assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kneadnet-*
          path: release-assets
          merge-multiple: true

      - name: Package public examples
        run: node scripts/package-examples.mjs --out release-assets

      - name: Verify assets and generate checksums
        run: node scripts/verify-release-assets.mjs --dir release-assets

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --json isDraft > release.json 2>/dev/null; then
            if [[ "$(jq --raw-output .isDraft release.json)" != "true" ]]; then
              echo "Refusing to replace assets on an already published release."
              exit 1
            fi
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --draft --generate-notes --title "KneadNet ${GITHUB_REF_NAME}"
          fi
          gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
